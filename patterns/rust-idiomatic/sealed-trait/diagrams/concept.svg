<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .inside  { fill: #dcfce7; stroke: #166534; stroke-width: 2; }
    .outside { fill: #fee2e2; stroke: #991b1b; stroke-width: 2; }
    .wall    { stroke: #6b7280; stroke-width: 2; stroke-dasharray: 6 4; fill: none; }
    .arrow   { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#a); }
    .barrier { stroke: #991b1b; stroke-width: 2; fill: none; marker-end: url(#b); }
    .label   { font-size: 13px; fill: #111827; }
    .sub     { font-size: 11px; fill: #374151; }
    .title   { font-size: 15px; font-weight: 600; fill: #111827; }
    .axis    { font-size: 11px; font-weight: 600; fill: #6b7280; letter-spacing: .05em; }
    .mono    { font-family: ui-monospace, monospace; font-size: 11px; fill: #1e3a8a; }
    .good    { font-size: 11px; fill: #166534; font-style: italic; }
    .bad     { font-size: 11px; fill: #991b1b; font-style: italic; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <marker id="b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#991b1b"/>
    </marker>
  </defs>

  <text x="20" y="26" class="title">Sealed Trait — public contract, private implementation set</text>

  <rect x="20" y="50" width="440" height="240" rx="10" class="wall"/>
  <text x="34" y="70" class="axis">YOUR CRATE</text>

  <rect x="40"  y="90"  width="180" height="60" rx="8" class="inside"/>
  <text x="130" y="114" text-anchor="middle" class="label">mod private {</text>
  <text x="130" y="132" text-anchor="middle" class="mono">pub trait Sealed {}</text>

  <rect x="240" y="90"  width="200" height="60" rx="8" class="inside"/>
  <text x="340" y="114" text-anchor="middle" class="mono">pub trait Format:</text>
  <text x="340" y="132" text-anchor="middle" class="mono">  private::Sealed { ... }</text>

  <path class="arrow" d="M220 120 L240 120"/>

  <rect x="40"  y="170" width="180" height="60" rx="8" class="inside"/>
  <text x="130" y="196" text-anchor="middle" class="mono">impl private::Sealed for Json</text>
  <text x="130" y="216" text-anchor="middle" class="mono">impl Format for Json { ... }</text>

  <rect x="240" y="170" width="200" height="60" rx="8" class="inside"/>
  <text x="340" y="196" text-anchor="middle" class="mono">impl private::Sealed for Yaml</text>
  <text x="340" y="216" text-anchor="middle" class="mono">impl Format for Yaml { ... }</text>

  <text x="40" y="270" class="good">✓ crate can freely impl Sealed and Format for new types</text>

  <rect x="500" y="50" width="200" height="240" rx="10" class="wall"/>
  <text x="514" y="70" class="axis">DOWNSTREAM CRATE</text>

  <rect x="520" y="90" width="160" height="80" rx="8" class="outside"/>
  <text x="600" y="116" text-anchor="middle" class="mono">struct Bespoke;</text>
  <text x="600" y="136" text-anchor="middle" class="mono">impl Format for Bespoke</text>
  <text x="600" y="154" text-anchor="middle" class="bad">E0277</text>

  <path class="barrier" d="M440 120 L500 120"/>
  <text x="470" y="110" text-anchor="middle" class="bad">blocked</text>

  <text x="520" y="250" class="sub">downstream cannot name</text>
  <text x="520" y="266" class="sub">`private::Sealed` to satisfy</text>
  <text x="520" y="282" class="sub">the supertrait bound</text>
</svg>
