<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .consume { fill: #dcfce7; stroke: #166534; stroke-width: 2; }
    .mutref  { fill: #fef3c7; stroke: #92400e; stroke-width: 2; }
    .bad     { fill: #fee2e2; stroke: #991b1b; stroke-width: 2; }
    .arrow   { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#a); }
    .label   { font-size: 13px; fill: #111827; }
    .sub     { font-size: 11px; fill: #374151; }
    .title   { font-size: 15px; font-weight: 600; fill: #111827; }
    .axis    { font-size: 11px; font-weight: 600; fill: #6b7280; letter-spacing: .05em; }
    .mono    { font-family: ui-monospace, monospace; font-size: 11px; fill: #1e3a8a; }
    .good    { font-size: 11px; fill: #166534; font-style: italic; }
    .warn    { font-size: 11px; fill: #92400e; font-style: italic; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="20" y="26" class="title">Consuming self vs mutable reference — same Builder, different lifecycle</text>

  <text x="20" y="60" class="axis">CONSUMING SELF — fluent, one-shot</text>
  <rect x="20" y="80" width="680" height="70" rx="8" class="consume"/>
  <text x="40"  y="102" class="mono">fn timeout(mut self, t: Duration) -&gt; Self { self.timeout = Some(t); self }</text>
  <text x="40"  y="122" class="mono">let c = HttpClient::builder().endpoint("...").timeout(5s).build()?;</text>
  <text x="40"  y="140" class="good">one chain, one expression · .build() consumes · save-and-reuse not allowed</text>

  <text x="20" y="180" class="axis">&amp;mut SELF — long-lived, re-usable</text>
  <rect x="20" y="200" width="680" height="70" rx="8" class="mutref"/>
  <text x="40"  y="222" class="mono">fn timeout(&amp;mut self, t: Duration) -&gt; &amp;mut Self { self.timeout = Some(t); self }</text>
  <text x="40"  y="242" class="mono">let mut b = HttpClient::builder(); b.endpoint("..."); b.timeout(5s); let c = b.build()?;</text>
  <text x="40"  y="260" class="warn">branches and reuse work · .build(&amp;self) must clone fields out · fields need Clone</text>

  <rect x="20" y="290" width="680" height="40" rx="8" class="bad"/>
  <text x="40"  y="313" class="mono">let b = HttpClient::builder().endpoint("a"); let c1 = b.build(); let c2 = b.build(); // E0382</text>
</svg>
