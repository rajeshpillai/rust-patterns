<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .src    { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; }
    .tagA   { fill: #dcfce7; stroke: #166534; stroke-width: 2; }
    .tagB   { fill: #fef3c7; stroke: #92400e; stroke-width: 2; }
    .bad    { fill: #fee2e2; stroke: #991b1b; stroke-width: 2; }
    .arrow  { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#a); }
    .xarrow { stroke: #991b1b; stroke-width: 2; stroke-dasharray: 4 3; fill: none; }
    .label  { font-size: 13px; fill: #111827; }
    .sub    { font-size: 11px; fill: #374151; }
    .title  { font-size: 15px; font-weight: 600; fill: #111827; }
    .axis   { font-size: 11px; font-weight: 600; fill: #6b7280; letter-spacing: .05em; }
    .mono   { font-family: ui-monospace, monospace; font-size: 11px; fill: #1e3a8a; }
    .good   { font-size: 11px; fill: #166534; font-style: italic; }
    .panic  { font-size: 11px; fill: #991b1b; font-style: italic; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="20" y="26" class="title">PhantomData — type-level tags with zero runtime cost</text>

  <text x="20" y="60" class="axis">SAME LAYOUT</text>
  <rect x="20" y="80" width="680" height="60" rx="8" class="src"/>
  <text x="360" y="106" text-anchor="middle" class="mono">struct Wrapping&lt;Unit&gt; { value: u64, _marker: PhantomData&lt;Unit&gt; }</text>
  <text x="360" y="128" text-anchor="middle" class="sub">Wrapping&lt;Seconds&gt; and Wrapping&lt;Milliseconds&gt; are both 8 bytes at runtime</text>

  <text x="20" y="170" class="axis">DIFFERENT TYPES</text>

  <rect x="60"  y="190" width="200" height="70" rx="8" class="tagA"/>
  <text x="160" y="216" text-anchor="middle" class="mono">Wrapping&lt;Seconds&gt;</text>
  <text x="160" y="238" text-anchor="middle" class="sub">duration in seconds</text>

  <rect x="460" y="190" width="200" height="70" rx="8" class="tagB"/>
  <text x="560" y="216" text-anchor="middle" class="mono">Wrapping&lt;Milliseconds&gt;</text>
  <text x="560" y="238" text-anchor="middle" class="sub">duration in milliseconds</text>

  <path class="xarrow" d="M260 225 L460 225"/>
  <text x="360" y="215" text-anchor="middle" class="panic">adding them: E0308 mismatched types</text>
  <text x="360" y="248" text-anchor="middle" class="good">the type parameter is doing the work the runtime doesn't</text>
</svg>
