<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .state { fill: #fef3c7; stroke: #92400e; stroke-width: 2; }
    .state-ok { fill: #dcfce7; stroke: #166534; stroke-width: 2; }
    .arrow { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#a); }
    .arrow-gate { stroke: #991b1b; stroke-width: 2; stroke-dasharray: 5 3; fill: none; marker-end: url(#a); }
    .label { font-size: 13px; fill: #111827; }
    .sub { font-size: 11px; fill: #374151; }
    .type { font-size: 12px; font-family: ui-monospace, monospace; fill: #1e3a8a; }
    .title { font-size: 16px; font-weight: 600; fill: #111827; }
    .gate { font-size: 11px; fill: #991b1b; font-style: italic; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="20" y="28" class="title">Typestate: the compiler is your state machine</text>

  <rect x="30" y="70" width="180" height="90" rx="10" class="state"/>
  <text x="120" y="100" text-anchor="middle" class="label">Builder&lt;Missing&gt;</text>
  <text x="120" y="120" text-anchor="middle" class="sub">no endpoint set yet</text>
  <text x="120" y="140" text-anchor="middle" class="type">fn new()</text>

  <rect x="410" y="70" width="200" height="90" rx="10" class="state-ok"/>
  <text x="510" y="100" text-anchor="middle" class="label">Builder&lt;Provided&gt;</text>
  <text x="510" y="120" text-anchor="middle" class="sub">endpoint is guaranteed</text>
  <text x="510" y="140" text-anchor="middle" class="type">fn build() lives here</text>

  <path class="arrow" d="M210 115 L410 115"/>
  <text x="310" y="100" text-anchor="middle" class="type">.endpoint(url)</text>
  <text x="310" y="135" text-anchor="middle" class="sub">consumes self,</text>
  <text x="310" y="150" text-anchor="middle" class="sub">changes the type parameter</text>

  <rect x="410" y="210" width="200" height="70" rx="10" class="state-ok"/>
  <text x="510" y="240" text-anchor="middle" class="label">HttpClient</text>
  <text x="510" y="260" text-anchor="middle" class="sub">fully validated value</text>

  <path class="arrow" d="M510 160 L510 210"/>
  <text x="525" y="187" class="type">.build()</text>

  <path class="arrow-gate" d="M120 160 L120 245"/>
  <text x="135" y="200" class="gate">.build() not</text>
  <text x="135" y="215" class="gate">defined here</text>
  <text x="135" y="230" class="gate">(E0599)</text>

  <rect x="30" y="210" width="180" height="70" rx="10" class="state" fill="#fee2e2" stroke="#991b1b"/>
  <text x="120" y="240" text-anchor="middle" class="label">compile error</text>
  <text x="120" y="260" text-anchor="middle" class="sub">method not found</text>
</svg>
