<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .box      { fill: #fef3c7; stroke: #92400e; stroke-width: 2; }
    .box-ok   { fill: #dcfce7; stroke: #166534; stroke-width: 2; }
    .box-err  { fill: #fee2e2; stroke: #991b1b; stroke-width: 2; }
    .arrow    { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#a); }
    .arrow-err{ stroke: #991b1b; stroke-width: 2;   fill: none; marker-end: url(#a); }
    .label    { font-size: 13px; fill: #111827; }
    .sub      { font-size: 11px; fill: #374151; }
    .title    { font-size: 15px; font-weight: 600; fill: #111827; }
    .axis     { font-size: 11px; font-weight: 600; fill: #6b7280; letter-spacing: .05em; }
    .mono     { font-family: ui-monospace, monospace; font-size: 11px; fill: #1e3a8a; }
    .panic    { font-size: 11px; fill: #991b1b; font-style: italic; }
    .good     { font-size: 11px; fill: #166534; font-style: italic; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="20" y="26" class="title">Error-as-Values — what `?` actually does</text>

  <text x="20" y="60" class="axis">CALL SITE</text>
  <rect x="20" y="78" width="680" height="46" rx="8" class="box"/>
  <text x="360" y="108" text-anchor="middle" class="mono">let config = parse_config(path)?;</text>

  <path class="arrow" d="M360 124 L360 154"/>

  <rect x="240" y="160" width="240" height="46" rx="8" class="box"/>
  <text x="360" y="188" text-anchor="middle" class="mono">match parse_config(path) {</text>

  <path class="arrow"     d="M300 206 L140 240"/>
  <path class="arrow-err" d="M420 206 L580 240"/>

  <rect x="40"  y="240" width="220" height="70" rx="8" class="box-ok"/>
  <text x="150" y="264" text-anchor="middle" class="mono">Ok(v) =&gt; v,</text>
  <text x="150" y="282" text-anchor="middle" class="sub">bind + continue</text>
  <text x="150" y="300" text-anchor="middle" class="good">happy path</text>

  <rect x="460" y="240" width="240" height="70" rx="8" class="box-err"/>
  <text x="580" y="264" text-anchor="middle" class="mono">Err(e) =&gt; return Err(e.into()),</text>
  <text x="580" y="282" text-anchor="middle" class="sub">convert via From&lt;InnerErr&gt;</text>
  <text x="580" y="300" text-anchor="middle" class="panic">propagate up the stack</text>
</svg>
