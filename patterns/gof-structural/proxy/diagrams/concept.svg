<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .client { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; }
    .proxy  { fill: #fef3c7; stroke: #92400e; stroke-width: 2; }
    .real   { fill: #dcfce7; stroke: #166534; stroke-width: 2; }
    .arrow  { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#a); }
    .xarrow { stroke: #991b1b; stroke-width: 2; fill: none; marker-end: url(#b); }
    .label  { font-size: 13px; fill: #111827; }
    .sub    { font-size: 11px; fill: #374151; }
    .title  { font-size: 15px; font-weight: 600; fill: #111827; }
    .axis   { font-size: 11px; font-weight: 600; fill: #6b7280; letter-spacing: .05em; }
    .mono   { font-family: ui-monospace, monospace; font-size: 11px; fill: #1e3a8a; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <marker id="b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#991b1b"/>
    </marker>
  </defs>

  <text x="20" y="26" class="title">Proxy — a gatekeeper that shares the target's interface</text>

  <rect x="20" y="80" width="120" height="60" rx="8" class="client"/>
  <text x="80" y="108" text-anchor="middle" class="label">Client</text>
  <text x="80" y="126" text-anchor="middle" class="sub">holds &amp; Fetcher</text>

  <path class="arrow" d="M140 110 L200 110"/>
  <text x="170" y="100" text-anchor="middle" class="mono">.fetch(key)</text>

  <rect x="200" y="80" width="160" height="60" rx="8" class="proxy"/>
  <text x="280" y="102" text-anchor="middle" class="label">Proxy</text>
  <text x="280" y="120" text-anchor="middle" class="sub">auth · cache · lazy</text>
  <text x="280" y="136" text-anchor="middle" class="sub">same trait as real</text>

  <path class="arrow"  d="M360 110 L420 110"/>
  <text x="390" y="100" text-anchor="middle" class="sub">pass-through</text>
  <path class="xarrow" d="M360 130 L420 160"/>
  <text x="390" y="155" class="sub">short-circuit</text>

  <rect x="420" y="80" width="140" height="60" rx="8" class="real"/>
  <text x="490" y="108" text-anchor="middle" class="label">RealFetcher</text>
  <text x="490" y="126" text-anchor="middle" class="sub">actual work</text>

  <rect x="420" y="140" width="140" height="60" rx="8" class="proxy" fill="#fee2e2" stroke="#991b1b"/>
  <text x="490" y="168" text-anchor="middle" class="label">Err / cached</text>
  <text x="490" y="186" text-anchor="middle" class="sub">(no real call)</text>

  <text x="20"  y="242" class="axis">FOUR FLAVORS</text>
  <rect x="20" y="260" width="680" height="40" rx="8" class="proxy"/>
  <text x="40"  y="285" class="mono">virtual (lazy load) · protection (auth / ACL) · caching · smart reference (Arc/Rc refcount)</text>
</svg>
