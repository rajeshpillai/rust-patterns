<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .abs    { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; }
    .impl   { fill: #fef3c7; stroke: #92400e; stroke-width: 2; }
    .arrow  { stroke: #374151; stroke-width: 1.5; fill: none; marker-end: url(#a); }
    .label  { font-size: 13px; fill: #111827; }
    .sub    { font-size: 11px; fill: #374151; }
    .title  { font-size: 15px; font-weight: 600; fill: #111827; }
    .axis   { font-size: 11px; font-weight: 600; fill: #6b7280; letter-spacing: .05em; }
    .mono   { font-family: ui-monospace, monospace; font-size: 11px; fill: #1e3a8a; }
    .good   { font-size: 11px; fill: #166534; font-style: italic; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="20" y="26" class="title">Bridge — two axes that vary independently</text>

  <text x="20" y="60" class="axis">ABSTRACTION AXIS (what kind of message)</text>
  <rect x="20"  y="80" width="160" height="50" rx="8" class="abs"/>
  <text x="100" y="108" text-anchor="middle" class="label">NormalMessage</text>
  <rect x="200" y="80" width="160" height="50" rx="8" class="abs"/>
  <text x="280" y="108" text-anchor="middle" class="label">UrgentMessage</text>
  <rect x="380" y="80" width="160" height="50" rx="8" class="abs"/>
  <text x="460" y="108" text-anchor="middle" class="label">ArchivedMessage</text>

  <text x="20" y="170" class="axis">IMPLEMENTATION AXIS (how to render)</text>
  <rect x="20"  y="190" width="160" height="50" rx="8" class="impl"/>
  <text x="100" y="218" text-anchor="middle" class="label">PlainRenderer</text>
  <rect x="200" y="190" width="160" height="50" rx="8" class="impl"/>
  <text x="280" y="218" text-anchor="middle" class="label">HtmlRenderer</text>
  <rect x="380" y="190" width="160" height="50" rx="8" class="impl"/>
  <text x="460" y="218" text-anchor="middle" class="label">MarkdownRenderer</text>

  <path class="arrow" d="M100 130 L100 190"/>
  <path class="arrow" d="M280 130 L280 190"/>
  <path class="arrow" d="M460 130 L460 190"/>
  <path class="arrow" d="M100 130 L280 190"/>
  <path class="arrow" d="M280 130 L460 190"/>
  <path class="arrow" d="M460 130 L100 190"/>

  <rect x="580" y="80" width="120" height="160" rx="8" class="abs" fill="white" stroke="#6b7280"/>
  <text x="640" y="110" text-anchor="middle" class="mono">Abstraction</text>
  <text x="640" y="128" text-anchor="middle" class="mono">× 3</text>
  <text x="640" y="152" text-anchor="middle" class="mono">Implementation</text>
  <text x="640" y="170" text-anchor="middle" class="mono">× 3</text>
  <text x="640" y="198" text-anchor="middle" class="good">3 + 3 = 6 types</text>
  <text x="640" y="214" text-anchor="middle" class="good">(naive: 9 types)</text>
</svg>
