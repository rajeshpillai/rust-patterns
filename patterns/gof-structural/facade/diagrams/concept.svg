<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .subsys { fill: #fef3c7; stroke: #92400e; stroke-width: 2; }
    .facade { fill: #dcfce7; stroke: #166534; stroke-width: 2; }
    .caller { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; }
    .arrow  { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#a); }
    .label  { font-size: 13px; fill: #111827; }
    .sub    { font-size: 11px; fill: #374151; }
    .title  { font-size: 15px; font-weight: 600; fill: #111827; }
    .axis   { font-size: 11px; font-weight: 600; fill: #6b7280; letter-spacing: .05em; }
    .mono   { font-family: ui-monospace, monospace; font-size: 11px; fill: #1e3a8a; }
    .good   { font-size: 11px; fill: #166534; font-style: italic; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="20" y="26" class="title">Facade — one friendly entry point in front of a busy subsystem</text>

  <rect x="60" y="60" width="180" height="50" rx="8" class="caller"/>
  <text x="150" y="90" text-anchor="middle" class="label">Caller</text>

  <path class="arrow" d="M240 85 L340 85"/>
  <text x="290" y="76" text-anchor="middle" class="mono">builder.generate(path)</text>

  <rect x="340" y="60" width="200" height="50" rx="8" class="facade"/>
  <text x="440" y="82"  text-anchor="middle" class="label">ReportBuilder (facade)</text>
  <text x="440" y="100" text-anchor="middle" class="sub">one public type, one API</text>

  <path class="arrow" d="M440 110 L130 160"/>
  <path class="arrow" d="M440 110 L290 160"/>
  <path class="arrow" d="M440 110 L450 160"/>
  <path class="arrow" d="M440 110 L610 160"/>

  <rect x="40"  y="160" width="180" height="50" rx="8" class="subsys"/>
  <text x="130" y="185" text-anchor="middle" class="mono">loader::load_file</text>
  <text x="130" y="202" text-anchor="middle" class="sub">(private)</text>

  <rect x="220" y="160" width="140" height="50" rx="8" class="subsys"/>
  <text x="290" y="185" text-anchor="middle" class="mono">parser::parse_csv</text>
  <text x="290" y="202" text-anchor="middle" class="sub">(private)</text>

  <rect x="380" y="160" width="140" height="50" rx="8" class="subsys"/>
  <text x="450" y="185" text-anchor="middle" class="mono">validator::check</text>
  <text x="450" y="202" text-anchor="middle" class="sub">(private)</text>

  <rect x="540" y="160" width="140" height="50" rx="8" class="subsys"/>
  <text x="610" y="185" text-anchor="middle" class="mono">renderer::emit</text>
  <text x="610" y="202" text-anchor="middle" class="sub">(private)</text>

  <text x="20" y="262" class="good">Callers never name loader/parser/validator/renderer.</text>
  <text x="20" y="280" class="good">The facade owns the orchestration; the subsystem types can stay `pub(crate)` or private.</text>
</svg>
