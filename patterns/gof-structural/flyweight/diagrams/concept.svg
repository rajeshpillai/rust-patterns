<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .light  { fill: #dcfce7; stroke: #166534; stroke-width: 2; }
    .heavy  { fill: #fef3c7; stroke: #92400e; stroke-width: 2; }
    .arrow  { stroke: #374151; stroke-width: 1.5; fill: none; marker-end: url(#a); }
    .label  { font-size: 13px; fill: #111827; }
    .sub    { font-size: 11px; fill: #374151; }
    .title  { font-size: 15px; font-weight: 600; fill: #111827; }
    .axis   { font-size: 11px; font-weight: 600; fill: #6b7280; letter-spacing: .05em; }
    .mono   { font-family: ui-monospace, monospace; font-size: 11px; fill: #1e3a8a; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="20" y="26" class="title">Flyweight — millions of light instances share a handful of heavy buffers</text>

  <text x="20" y="60" class="axis">LIGHT PER-INSTANCE (Glyph) — 1,000,000 of these</text>
  <rect x="20" y="80" width="120" height="50" rx="8" class="light"/>
  <text x="80" y="108" text-anchor="middle" class="label">Glyph 'a'</text>
  <rect x="160" y="80" width="120" height="50" rx="8" class="light"/>
  <text x="220" y="108" text-anchor="middle" class="label">Glyph 'b'</text>
  <rect x="300" y="80" width="120" height="50" rx="8" class="light"/>
  <text x="360" y="108" text-anchor="middle" class="label">Glyph 'c'</text>
  <rect x="440" y="80" width="200" height="50" rx="8" class="light"/>
  <text x="540" y="108" text-anchor="middle" class="label">... 999,997 more</text>

  <path class="arrow" d="M80 130 L220 200"/>
  <path class="arrow" d="M220 130 L460 200"/>
  <path class="arrow" d="M360 130 L220 200"/>
  <path class="arrow" d="M540 130 L460 200"/>

  <text x="20" y="190" class="axis">HEAVY SHARED (FontData) — 3 in the pool</text>
  <rect x="160" y="210" width="200" height="50" rx="8" class="heavy"/>
  <text x="260" y="235" text-anchor="middle" class="label">FontData: Inter 12pt</text>
  <text x="260" y="253" text-anchor="middle" class="sub">TTF bytes, shared</text>

  <rect x="400" y="210" width="200" height="50" rx="8" class="heavy"/>
  <text x="500" y="235" text-anchor="middle" class="label">FontData: Mono 14pt</text>
  <text x="500" y="253" text-anchor="middle" class="sub">TTF bytes, shared</text>

  <text x="20" y="284" class="mono">Each Glyph: Arc&lt;FontData&gt; + (char, position)  →  memory is O(instances) + O(buffers), not O(instances × buffer)</text>
</svg>
