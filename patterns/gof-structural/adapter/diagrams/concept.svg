<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .yours   { fill: #dcfce7; stroke: #166534; stroke-width: 2; }
    .theirs  { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; }
    .bad     { fill: #fee2e2; stroke: #991b1b; stroke-width: 2; }
    .arrow   { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#a); }
    .xarrow  { stroke: #991b1b; stroke-width: 2; stroke-dasharray: 4 3; fill: none; }
    .label   { font-size: 13px; fill: #111827; }
    .sub     { font-size: 11px; fill: #374151; }
    .title   { font-size: 15px; font-weight: 600; fill: #111827; }
    .axis    { font-size: 11px; font-weight: 600; fill: #6b7280; letter-spacing: .05em; }
    .mono    { font-family: ui-monospace, monospace; font-size: 11px; fill: #1e3a8a; }
    .good    { font-size: 11px; fill: #166534; font-style: italic; }
    .panic   { font-size: 11px; fill: #991b1b; font-style: italic; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="20" y="26" class="title">Adapter — wrap foreign types to satisfy YOUR trait</text>

  <text x="20" y="60" class="axis">FOREIGN CRATE (you don't control it)</text>
  <rect x="20" y="80" width="200" height="60" rx="8" class="theirs"/>
  <text x="120" y="108" text-anchor="middle" class="label">struct LegacyReader</text>
  <text x="120" y="126" text-anchor="middle" class="sub">.read_chunk() -> Vec&lt;u8&gt;</text>

  <text x="260" y="60" class="axis">YOUR CRATE</text>
  <rect x="260" y="80" width="200" height="60" rx="8" class="yours"/>
  <text x="360" y="108" text-anchor="middle" class="label">struct LegacyAdapter(LegacyReader)</text>
  <text x="360" y="126" text-anchor="middle" class="sub">implements std::io::Read</text>

  <rect x="500" y="80" width="200" height="60" rx="8" class="yours"/>
  <text x="600" y="108" text-anchor="middle" class="label">serde_json::from_reader(adapter)</text>
  <text x="600" y="126" text-anchor="middle" class="sub">sees a std::io::Read — happy</text>

  <path class="arrow" d="M220 110 L260 110"/>
  <path class="arrow" d="M460 110 L500 110"/>

  <rect x="60" y="200" width="200" height="60" rx="8" class="bad"/>
  <text x="160" y="228" text-anchor="middle" class="mono">impl Read for LegacyReader</text>
  <text x="160" y="246" text-anchor="middle" class="panic">E0117 — orphan rule</text>

  <path class="xarrow" d="M160 200 L160 160"/>
  <text x="280" y="228" class="good">Newtype wrapper is the escape hatch: LegacyAdapter lives in YOUR crate,</text>
  <text x="280" y="245" class="good">so `impl Read for LegacyAdapter` is allowed and the coherence rule holds.</text>
</svg>
