<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .core    { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; }
    .layer1  { fill: #dcfce7; stroke: #166534; stroke-width: 2; }
    .layer2  { fill: #fef3c7; stroke: #92400e; stroke-width: 2; }
    .layer3  { fill: #f3e8ff; stroke: #6b21a8; stroke-width: 2; }
    .arrow   { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#a); }
    .label   { font-size: 13px; fill: #111827; }
    .sub     { font-size: 11px; fill: #374151; }
    .title   { font-size: 15px; font-weight: 600; fill: #111827; }
    .mono    { font-family: ui-monospace, monospace; font-size: 11px; fill: #1e3a8a; }
    .good    { font-size: 11px; fill: #166534; font-style: italic; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="20" y="26" class="title">Decorator — wrappers that preserve a trait while adding behavior</text>

  <rect x="20"  y="60"  width="110" height="60" rx="8" class="core"/>
  <text x="75"  y="86"  text-anchor="middle" class="label">File</text>
  <text x="75"  y="104" text-anchor="middle" class="sub">impl Read</text>

  <path class="arrow" d="M130 90 L180 90"/>

  <rect x="180" y="60"  width="150" height="60" rx="8" class="layer1"/>
  <text x="255" y="86"  text-anchor="middle" class="label">GzipDecoder&lt;File&gt;</text>
  <text x="255" y="104" text-anchor="middle" class="sub">+ decompression</text>

  <path class="arrow" d="M330 90 L380 90"/>

  <rect x="380" y="60"  width="150" height="60" rx="8" class="layer2"/>
  <text x="455" y="86"  text-anchor="middle" class="label">BufReader&lt;...&gt;</text>
  <text x="455" y="104" text-anchor="middle" class="sub">+ buffering</text>

  <path class="arrow" d="M530 90 L580 90"/>

  <rect x="580" y="60"  width="120" height="60" rx="8" class="layer3"/>
  <text x="640" y="86"  text-anchor="middle" class="label">LoggingReader</text>
  <text x="640" y="104" text-anchor="middle" class="sub">+ instrumentation</text>

  <rect x="20" y="160" width="680" height="80" rx="10" class="core" fill="white" stroke="#374151"/>
  <text x="40"  y="184" class="mono">let src = File::open("data.json.gz")?;</text>
  <text x="40"  y="202" class="mono">let src = GzipDecoder::new(src);</text>
  <text x="40"  y="220" class="mono">let mut src = BufReader::new(LoggingReader::new(src));</text>
  <text x="400" y="202" class="good">each layer is generic over</text>
  <text x="400" y="220" class="good">its inner type → zero vtable</text>
</svg>
