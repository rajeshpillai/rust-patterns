<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .hub    { fill: #dcfce7; stroke: #166534; stroke-width: 2; }
    .peer   { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; }
    .arrow  { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#a); }
    .label  { font-size: 13px; fill: #111827; }
    .sub    { font-size: 11px; fill: #374151; }
    .title  { font-size: 15px; font-weight: 600; fill: #111827; }
    .axis   { font-size: 11px; font-weight: 600; fill: #6b7280; letter-spacing: .05em; }
    .mono   { font-family: ui-monospace, monospace; font-size: 11px; fill: #1e3a8a; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="20" y="26" class="title">Mediator — peers talk to the hub, never to each other</text>

  <rect x="300" y="120" width="120" height="60" rx="8" class="hub"/>
  <text x="360" y="146" text-anchor="middle" class="label">ChatRoom (hub)</text>
  <text x="360" y="166" text-anchor="middle" class="sub">broadcast::Sender</text>

  <rect x="20"  y="60" width="120" height="50" rx="8" class="peer"/>
  <text x="80"  y="88" text-anchor="middle" class="label">Alice</text>
  <rect x="20"  y="190" width="120" height="50" rx="8" class="peer"/>
  <text x="80"  y="218" text-anchor="middle" class="label">Bob</text>
  <rect x="580" y="60" width="120" height="50" rx="8" class="peer"/>
  <text x="640" y="88" text-anchor="middle" class="label">Carol</text>
  <rect x="580" y="190" width="120" height="50" rx="8" class="peer"/>
  <text x="640" y="218" text-anchor="middle" class="label">Dave</text>

  <path class="arrow" d="M140 85 L300 130"/>
  <path class="arrow" d="M140 215 L300 170"/>
  <path class="arrow" d="M580 85 L420 130"/>
  <path class="arrow" d="M580 215 L420 170"/>

  <path class="arrow" d="M300 140 L140 85"  stroke-dasharray="3 3"/>
  <path class="arrow" d="M300 160 L140 215" stroke-dasharray="3 3"/>
  <path class="arrow" d="M420 140 L580 85"  stroke-dasharray="3 3"/>
  <path class="arrow" d="M420 160 L580 215" stroke-dasharray="3 3"/>

  <text x="160" y="275" class="sub">solid arrow: peer publishes to hub · dashed arrow: hub fans out to every subscriber</text>
</svg>
