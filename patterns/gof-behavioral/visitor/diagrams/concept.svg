<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .match  { fill: #dcfce7; stroke: #166534; stroke-width: 2; }
    .visitor{ fill: #fef3c7; stroke: #92400e; stroke-width: 2; }
    .arrow  { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#a); }
    .label  { font-size: 13px; fill: #111827; }
    .sub    { font-size: 11px; fill: #374151; }
    .title  { font-size: 15px; font-weight: 600; fill: #111827; }
    .axis   { font-size: 11px; font-weight: 600; fill: #6b7280; letter-spacing: .05em; }
    .mono   { font-family: ui-monospace, monospace; font-size: 11px; fill: #1e3a8a; }
    .good   { font-size: 11px; fill: #166534; font-style: italic; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="20" y="26" class="title">Visitor — enum+match vs trait Visitor (the Expression Problem)</text>

  <text x="20" y="60" class="axis">CLOSED TYPES, OPEN OPERATIONS — Rust default</text>
  <rect x="20" y="80" width="680" height="90" rx="10" class="match"/>
  <text x="40"  y="102" class="mono">enum Expr { Num(i64), Add(Box&lt;Expr&gt;, Box&lt;Expr&gt;), Var(String) }</text>
  <text x="40"  y="122" class="mono">fn eval(e: &amp;Expr, env: &amp;Env) -&gt; i64 { match e { ... } }</text>
  <text x="40"  y="142" class="mono">fn print(e: &amp;Expr) -&gt; String     { match e { ... } }</text>
  <text x="40"  y="160" class="good">adding a new operation = new function · adding a variant = touch every match</text>

  <text x="20" y="200" class="axis">OPEN TYPES, CLOSED OPERATIONS — trait Visitor</text>
  <rect x="20" y="220" width="680" height="90" rx="10" class="visitor"/>
  <text x="40"  y="242" class="mono">trait Visitor { fn visit_num(...); fn visit_add(...); fn visit_var(...); }</text>
  <text x="40"  y="262" class="mono">trait Element { fn accept(&amp;self, v: &amp;mut dyn Visitor); }</text>
  <text x="40"  y="282" class="mono">impl Visitor for Printer { ... }  impl Visitor for Evaluator { ... }</text>
  <text x="40"  y="300" class="good">adding a new type = touch every Visitor impl · adding an operation = new impl</text>
</svg>
