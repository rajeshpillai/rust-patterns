<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .box     { fill: #fef3c7; stroke: #92400e; stroke-width: 2; }
    .box-ok  { fill: #dcfce7; stroke: #166534; stroke-width: 2; }
    .arrow   { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#a); }
    .label   { font-size: 13px; fill: #111827; }
    .sub     { font-size: 11px; fill: #374151; }
    .title   { font-size: 15px; font-weight: 600; fill: #111827; }
    .axis    { font-size: 11px; font-weight: 600; fill: #6b7280; letter-spacing: .05em; }
    .mono    { font-family: ui-monospace, monospace; font-size: 11px; fill: #1e3a8a; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="20" y="26" class="title">Strategy — four dispatch shapes, same intent</text>

  <text x="20"  y="66" class="axis">GENERIC (monomorphized, fastest)</text>
  <rect x="20"  y="84" width="320" height="60" rx="8" class="box-ok"/>
  <text x="180" y="108" text-anchor="middle" class="mono">struct Context&lt;S: Compress&gt; { strategy: S }</text>
  <text x="180" y="126" text-anchor="middle" class="sub">zero runtime cost · binary grows per instantiation</text>

  <text x="380" y="66" class="axis">TRAIT OBJECT (dyn)</text>
  <rect x="380" y="84" width="320" height="60" rx="8" class="box"/>
  <text x="540" y="108" text-anchor="middle" class="mono">strategy: Box&lt;dyn Compress&gt;</text>
  <text x="540" y="126" text-anchor="middle" class="sub">1 vtable lookup · swap at runtime · indirection</text>

  <text x="20"  y="186" class="axis">CLOSURE</text>
  <rect x="20"  y="204" width="320" height="60" rx="8" class="box-ok"/>
  <text x="180" y="228" text-anchor="middle" class="mono">strategy: Box&lt;dyn Fn(&amp;[u8]) -&gt; Vec&lt;u8&gt;&gt;</text>
  <text x="180" y="246" text-anchor="middle" class="sub">no trait needed · captures state · one-shot use</text>

  <text x="380" y="186" class="axis">ENUM + MATCH</text>
  <rect x="380" y="204" width="320" height="60" rx="8" class="box-ok"/>
  <text x="540" y="228" text-anchor="middle" class="mono">enum Compress { Gzip, Zstd, Noop }</text>
  <text x="540" y="246" text-anchor="middle" class="sub">closed set · exhaustive match · no dyn · fast</text>

  <path d="M20 300 L700 300" stroke="#9ca3af" stroke-dasharray="2 3" fill="none"/>
  <text x="20"  y="320" class="sub">Pick the left column by default. Reach for `dyn` only when the set of strategies is open at runtime.</text>
  <text x="20"  y="338" class="sub">Closures beat a one-off Strategy trait. Enums beat trait objects when the set is closed.</text>
</svg>
