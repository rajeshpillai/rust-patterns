<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .src    { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; }
    .adapt  { fill: #fef3c7; stroke: #92400e; stroke-width: 2; }
    .cons   { fill: #dcfce7; stroke: #166534; stroke-width: 2; }
    .arrow  { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#a); }
    .label  { font-size: 13px; fill: #111827; }
    .sub    { font-size: 11px; fill: #374151; }
    .title  { font-size: 15px; font-weight: 600; fill: #111827; }
    .axis   { font-size: 11px; font-weight: 600; fill: #6b7280; letter-spacing: .05em; }
    .mono   { font-family: ui-monospace, monospace; font-size: 11px; fill: #1e3a8a; }
    .good   { font-size: 11px; fill: #166534; font-style: italic; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="20" y="26" class="title">Iterator — lazy pipeline, one method to implement</text>

  <text x="20" y="64" class="axis">SOURCE (implements IntoIterator or Iterator)</text>
  <rect x="20" y="80" width="140" height="50" rx="8" class="src"/>
  <text x="90" y="108" text-anchor="middle" class="mono">vec![1,2,3,4,5]</text>

  <path class="arrow" d="M160 105 L200 105"/>

  <text x="220" y="64" class="axis">ADAPTERS (lazy — nothing runs yet)</text>

  <rect x="200" y="80" width="140" height="50" rx="8" class="adapt"/>
  <text x="270" y="108" text-anchor="middle" class="mono">.map(|x| x*x)</text>

  <path class="arrow" d="M340 105 L380 105"/>

  <rect x="380" y="80" width="160" height="50" rx="8" class="adapt"/>
  <text x="460" y="108" text-anchor="middle" class="mono">.filter(|&amp;n| n &gt; 4)</text>

  <path class="arrow" d="M540 105 L580 105"/>

  <text x="600" y="64" class="axis">CONSUMER (pulls the chain)</text>

  <rect x="580" y="80" width="160" height="50" rx="8" class="cons"/>
  <text x="660" y="105" text-anchor="middle" class="mono">.sum::&lt;i32&gt;()</text>
  <text x="660" y="122" text-anchor="middle" class="good">→ 50</text>

  <path d="M20 170 L740 170" stroke="#9ca3af" stroke-dasharray="2 3" fill="none"/>

  <text x="20" y="196" class="label">Implement one method, get the whole library for free.</text>

  <rect x="20" y="210" width="720" height="70" rx="8" class="src"/>
  <text x="40"  y="232" class="mono">impl Iterator for Fibonacci {</text>
  <text x="40"  y="250" class="mono">    type Item = u64;</text>
  <text x="40"  y="268" class="mono">    fn next(&amp;mut self) -&gt; Option&lt;u64&gt; { ... }</text>
  <text x="380" y="232" class="good">for free you get: map, filter, fold,</text>
  <text x="380" y="250" class="good">take, chain, zip, enumerate, collect,</text>
  <text x="380" y="268" class="good">sum, product, find, any, all, count, ...</text>
</svg>
