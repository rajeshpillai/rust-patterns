<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .core   { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; }
    .good   { fill: #dcfce7; stroke: #166534; stroke-width: 2; }
    .arrow  { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#a); }
    .label  { font-size: 13px; fill: #111827; }
    .sub    { font-size: 11px; fill: #374151; }
    .title  { font-size: 15px; font-weight: 600; fill: #111827; }
    .mono   { font-family: ui-monospace, monospace; font-size: 11px; fill: #1e3a8a; }
    .goodtxt{ font-size: 11px; fill: #166534; font-style: italic; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="20" y="26" class="title">Prototype — Rust's built-in `Clone` trait, full stop</text>

  <rect x="20" y="70" width="200" height="80" rx="8" class="core"/>
  <text x="120" y="96"  text-anchor="middle" class="label">template: Document</text>
  <text x="120" y="116" text-anchor="middle" class="sub">#[derive(Clone)]</text>
  <text x="120" y="134" text-anchor="middle" class="sub">on the struct</text>

  <path class="arrow" d="M220 110 L280 110"/>
  <text x="250" y="100" text-anchor="middle" class="sub">.clone()</text>

  <rect x="280" y="70" width="200" height="80" rx="8" class="good"/>
  <text x="380" y="96"  text-anchor="middle" class="label">doc: Document</text>
  <text x="380" y="116" text-anchor="middle" class="sub">fresh independent copy</text>
  <text x="380" y="134" text-anchor="middle" class="sub">mutation isolated</text>

  <path class="arrow" d="M480 110 L540 110"/>
  <text x="510" y="100" text-anchor="middle" class="sub">mutate</text>

  <rect x="540" y="70" width="160" height="80" rx="8" class="good"/>
  <text x="620" y="96"  text-anchor="middle" class="label">customized Document</text>
  <text x="620" y="116" text-anchor="middle" class="sub">independent of template</text>

  <rect x="20" y="180" width="680" height="60" rx="8" class="core" fill="white" stroke="#374151"/>
  <text x="40"  y="204" class="mono">let doc = template.clone();  doc.title.push_str(" (v2)");</text>
  <text x="40"  y="222" class="goodtxt">no Prototype class, no registry, no `clone()` virtual method to implement — just `#[derive(Clone)]`</text>
</svg>
