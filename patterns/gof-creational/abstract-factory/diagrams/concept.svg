<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .kit   { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; }
    .prod  { fill: #dcfce7; stroke: #166534; stroke-width: 2; }
    .bad   { fill: #fee2e2; stroke: #991b1b; stroke-width: 2; }
    .arrow { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#a); }
    .xarrow{ stroke: #991b1b; stroke-width: 2; stroke-dasharray: 4 3; fill: none; }
    .label { font-size: 13px; fill: #111827; }
    .sub   { font-size: 11px; fill: #374151; }
    .title { font-size: 15px; font-weight: 600; fill: #111827; }
    .axis  { font-size: 11px; font-weight: 600; fill: #6b7280; letter-spacing: .05em; }
    .mono  { font-family: ui-monospace, monospace; font-size: 11px; fill: #1e3a8a; }
    .panic { font-size: 11px; fill: #991b1b; font-style: italic; }
    .good  { font-size: 11px; fill: #166534; font-style: italic; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="20" y="26" class="title">Abstract Factory — families of products locked by associated types</text>

  <text x="20" y="60" class="axis">WINDOWS FAMILY</text>
  <rect x="20" y="80" width="120" height="50" rx="8" class="kit"/>
  <text x="80" y="108" text-anchor="middle" class="label">WindowsKit</text>
  <rect x="170" y="80" width="140" height="50" rx="8" class="prod"/>
  <text x="240" y="108" text-anchor="middle" class="label">WindowsButton</text>
  <rect x="330" y="80" width="140" height="50" rx="8" class="prod"/>
  <text x="400" y="108" text-anchor="middle" class="label">WindowsCheckbox</text>
  <path class="arrow" d="M140 105 L170 105"/>
  <path class="arrow" d="M310 105 L330 105"/>

  <text x="20" y="160" class="axis">MAC FAMILY</text>
  <rect x="20" y="180" width="120" height="50" rx="8" class="kit"/>
  <text x="80" y="208" text-anchor="middle" class="label">MacKit</text>
  <rect x="170" y="180" width="140" height="50" rx="8" class="prod"/>
  <text x="240" y="208" text-anchor="middle" class="label">MacButton</text>
  <rect x="330" y="180" width="140" height="50" rx="8" class="prod"/>
  <text x="400" y="208" text-anchor="middle" class="label">MacCheckbox</text>
  <path class="arrow" d="M140 205 L170 205"/>
  <path class="arrow" d="M310 205 L330 205"/>

  <path class="xarrow" d="M400 130 L240 180"/>
  <text x="540" y="155" class="panic">mixing WindowsCheckbox</text>
  <text x="540" y="171" class="panic">and MacButton — different</text>
  <text x="540" y="187" class="panic">associated types, E0308</text>

  <text x="20" y="280" class="good">UiKit::Button and UiKit::Checkbox are associated types — the Kit determines BOTH.</text>
  <text x="20" y="300" class="good">One `Kit: UiKit` parameter gives you the whole family.</text>
</svg>
