<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .box { fill: #fef3c7; stroke: #92400e; stroke-width: 2; }
    .box-alt { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; }
    .box-ok { fill: #dcfce7; stroke: #166534; stroke-width: 2; }
    .box-err { fill: #fee2e2; stroke: #991b1b; stroke-width: 2; }
    .label { font-size: 14px; fill: #111827; }
    .sub { font-size: 11px; fill: #374151; }
    .arrow { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#a); }
    .title { font-size: 16px; font-weight: 600; fill: #111827; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="20" y="28" class="title">Builder: one chain, one moment of truth</text>

  <rect x="20"  y="60" width="130" height="70" rx="8" class="box"/>
  <text x="85"  y="88" text-anchor="middle" class="label">Builder::new()</text>
  <text x="85"  y="108" text-anchor="middle" class="sub">all fields = None</text>

  <rect x="180" y="60" width="130" height="70" rx="8" class="box"/>
  <text x="245" y="88" text-anchor="middle" class="label">.endpoint(...)</text>
  <text x="245" y="108" text-anchor="middle" class="sub">self -> Self</text>

  <rect x="340" y="60" width="130" height="70" rx="8" class="box"/>
  <text x="405" y="88" text-anchor="middle" class="label">.timeout(...)</text>
  <text x="405" y="108" text-anchor="middle" class="sub">self -> Self</text>

  <rect x="500" y="60" width="130" height="70" rx="8" class="box-alt"/>
  <text x="565" y="88" text-anchor="middle" class="label">.build()</text>
  <text x="565" y="108" text-anchor="middle" class="sub">Result&lt;T, E&gt;</text>

  <path class="arrow" d="M150 95 L180 95"/>
  <path class="arrow" d="M310 95 L340 95"/>
  <path class="arrow" d="M470 95 L500 95"/>

  <rect x="340" y="180" width="130" height="60" rx="8" class="box-ok"/>
  <text x="405" y="205" text-anchor="middle" class="label">Ok(HttpClient)</text>
  <text x="405" y="223" text-anchor="middle" class="sub">fully validated</text>

  <rect x="500" y="180" width="130" height="60" rx="8" class="box-err"/>
  <text x="565" y="205" text-anchor="middle" class="label">Err(BuildError)</text>
  <text x="565" y="223" text-anchor="middle" class="sub">propagate with ?</text>

  <path class="arrow" d="M550 135 L430 180"/>
  <path class="arrow" d="M580 135 L575 180"/>

  <text x="20" y="200" class="sub">Ownership moves left-to-right.</text>
  <text x="20" y="218" class="sub">Each setter consumes self, returns Self.</text>
  <text x="20" y="236" class="sub">.build() is the only place validation happens.</text>
  <text x="20" y="254" class="sub">No unwrap. No panics. No shared mutable state.</text>
</svg>
